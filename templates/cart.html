<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart — HomeMade Pickles & Snacks</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #4A7C3F; --yellow: #D4A017; --yellow-light: #FBF4DC; --yellow-mid: #E8C547; --brown-col: #5C3A1E; --brown-light: #F5EDE3; --green-dark: #2E5226; --green-light: #EBF2E8;
            --green-mid: #6B9E5E; --white: #FFFFFF; --brown-mid: #8B5E3C; --bg: #FDFAF4;
            --text: #2C1A0E; --text-muted: #7A5C42; --border: #E2D5C3;
            --red: #DC2626;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

        .site-header { background: var(--green-dark) !important; position: fixed; top: 0; left: 0; right: 0; height: 68px; background: var(--green-dark); border-bottom: none; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; z-index: 1000; box-shadow: 0 1px 12px rgba(30,53,40,0.06); }
        .brand-btn { background: none; border: none; cursor: pointer; font-family: 'Merriweather', serif; font-size: 1.1rem; font-weight: 600; color: white; padding: 0; }
        .nav-links { list-style: none; display: flex; align-items: center; gap: 4px; }
        .nav-links a { font-size: 0.875rem; font-weight: 500; color: rgba(255,255,255,0.75); text-decoration: none; padding: 7px 12px; border-radius: 6px; transition: all 0.2s; }
        .nav-links a:hover { color: var(--yellow-mid); background: rgba(255,255,255,0.08); }
        .nav-links .cart-link { background: var(--yellow); color: var(--brown-col, #5C3A1E) !important; padding: 7px 16px; border-radius: 5px; display: flex; align-items: center; gap: 6px; font-weight: 600; }
        .nav-links .cart-link:hover { background: var(--green) !important; }
        .cart-badge { background: var(--brown-col, #5C3A1E); color: var(--yellow); font-size: 0.7rem; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: inline-flex; align-items: center; justify-content: center; padding: 0 4px; }

        .page-wrap { margin-top: 68px; max-width: 900px; margin-left: auto; margin-right: auto; padding: 48px 24px; }

        .page-title { font-family: 'Merriweather', serif; font-size: 1.8rem; font-weight: 600; color: var(--text); margin-bottom: 32px; }

        /* EMPTY STATE */
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
        .empty-state p { font-size: 1rem; font-weight: 300; }

        /* TABLE */
        .cart-table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
        .cart-table th { background: var(--yellow-light, #FBF4DC); color: var(--brown-mid, #8B5E3C); font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 14px 18px; text-align: left; border-bottom: 1px solid var(--border); }
        .cart-table td { padding: 16px 18px; border-bottom: 1px solid var(--border); font-size: 0.9rem; vertical-align: middle; }
        .cart-table tr:last-child td { border-bottom: none; }
        .cart-table tr:hover td { background: #FAFCFB; }

        .item-img { width: 52px; height: 52px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); margin-right: 12px; vertical-align: middle; }
        .item-name { font-weight: 500; color: var(--text); }

        .qty-controls { display: flex; align-items: center; gap: 8px; }
        .qty-btn { width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--white); color: var(--text); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; line-height: 1; }
        .qty-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
        .qty-value { min-width: 24px; text-align: center; font-weight: 600; font-size: 0.9rem; }

        .remove-btn { background: none; border: none; color: #BBBBBB; font-size: 0.8rem; font-weight: 500; cursor: pointer; padding: 5px 8px; border-radius: 4px; transition: all 0.2s; }
        .remove-btn:hover { color: var(--red); background: #FEF2F2; }

        /* TOTAL + CHECKOUT */
        .cart-footer { display: flex; justify-content: flex-end; align-items: center; gap: 24px; margin-top: 28px; flex-wrap: wrap; }
        .cart-total { font-family: 'Merriweather', serif; font-size: 1.3rem; font-weight: 600; color: var(--text); }
        .cart-total span { color: var(--green); }
        .checkout-btn { background: var(--green-dark); color: white; text-decoration: none; padding: 13px 32px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; transition: background 0.2s, transform 0.2s; display: inline-block; }
        .checkout-btn:hover { background: var(--green-dark); transform: translateY(-1px); }

        footer { background: var(--green-dark); color: rgba(255,255,255,0.7); text-align: center; padding: 32px 20px; margin-top: 60px; }
        footer .footer-brand { font-family: 'Merriweather', serif; font-size: 1rem; color: var(--yellow); display: block; margin-bottom: 6px; }
        footer p { font-size: 0.8rem; }
    </style>
</head>
<body>

    <header class="site-header">
        <button class="brand-btn">HomeMade Pickles &amp; Snacks</button>
        <nav>
            <ul class="nav-links">
                <li><a href="{{ url_for('home') }}">Home</a></li>
                <li><a href="{{ url_for('cart') }}" class="cart-link">🛒 Cart <span class="cart-badge" id="cart-count">0</span></a></li>
            </ul>
        </nav>
    </header>

    <div class="page-wrap">
        <h1 class="page-title">Your Cart</h1>
        <div id="cart-items"></div>
        <div class="cart-footer" id="cart-footer" style="display:none;">
            <div class="cart-total" id="total-amount"></div>
            <a href="{{ url_for('checkout') }}" class="checkout-btn">Proceed to Checkout →</a>
        </div>
    </div>

    <footer>
        <span class="footer-brand">HomeMade Pickles &amp; Snacks</span>
        <p>© 2024 · Preserving Traditions · Crafted with Love in India</p>
    </footer>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function renderCart() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('total-amount');
            const footer = document.getElementById('cart-footer');
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>Your cart is empty. <a href="{{ url_for("home") }}" style="color:var(--green);font-weight:600;">Continue shopping</a></p></div>';
                footer.style.display = 'none';
                updateCartCount();
                return;
            }

            let rows = '';
            cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                rows += `
                    <tr>
                        <td>
                            <img src="${item.image}" alt="${item.name}" class="item-img">
                            <span class="item-name">${item.name} (${item.weight})</span>
                        </td>
                        <td>₹${item.price}</td>
                        <td>
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                                <span class="qty-value">${item.qty}</span>
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            </div>
                        </td>
                        <td>₹${itemTotal}</td>
                        <td><button class="remove-btn" onclick="removeItem(${item.id})">Remove</button></td>
                    </tr>`;
            });

            container.innerHTML = `
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Item</th><th>Price</th><th>Quantity</th><th>Total</th><th></th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>`;

            totalEl.innerHTML = `Total: <span>₹${total}</span>`;
            footer.style.display = 'flex';
            updateCartCount();
        }

        function updateQuantity(itemId, change) {
            cart = cart.map(item => {
                if (item.id === itemId) item.qty = Math.max(1, item.qty + change);
                return item;
            });
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function removeItem(itemId) {
            cart = cart.filter(item => item.id !== itemId);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function updateCartCount() {
            const count = cart.reduce((acc, item) => acc + item.qty, 0);
            document.getElementById('cart-count').textContent = count;
        }

        renderCart();
    </script>
</body>
</html>
