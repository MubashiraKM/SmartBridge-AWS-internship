<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed — HomeMade Pickles</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #4A7C3F; --yellow: #D4A017; --yellow-light: #FBF4DC; --yellow-mid: #E8C547; --brown-col: #5C3A1E; --brown-light: #F5EDE3; --green-dark: #2E5226; --green-light: #EBF2E8;
            --white: #FFFFFF; --brown-mid: #8B5E3C; --bg: #FDFAF4; --text: #2C1A0E; --text-muted: #7A5C42; --border: #E2D5C3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        .site-header { background: var(--green-dark) !important; height: 68px; background: var(--green-dark); border-bottom: none; display: flex; align-items: center; padding: 0 48px; box-shadow: 0 1px 12px rgba(30,53,40,0.06); }
        .brand { font-family: 'Merriweather', serif; font-size: 1.1rem; font-weight: 600; color: white; }
        .nav-links { list-style: none; display: flex; align-items: center; gap: 4px; margin-left: auto; }
        .nav-links a { font-size: 0.875rem; font-weight: 500; color: rgba(255,255,255,0.75); text-decoration: none; padding: 7px 12px; border-radius: 6px; transition: all 0.2s; }
        .nav-links a:hover { color: var(--yellow-mid); background: rgba(255,255,255,0.08); }

        .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

        .success-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 60px 48px; text-align: center; max-width: 480px; width: 100%; box-shadow: 0 4px 24px rgba(30,53,40,0.07); }

        .success-icon { width: 72px; height: 72px; background: var(--green-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 2rem; }

        .success-title { font-family: 'Merriweather', serif; font-size: 1.8rem; font-weight: 600; color: var(--text); margin-bottom: 12px; }
        .success-sub { font-size: 0.95rem; color: var(--text-muted); line-height: 1.6; font-weight: 300; margin-bottom: 36px; }

        .success-divider { width: 40px; height: 3px; background: var(--green); border-radius: 2px; margin: 0 auto 30px; }

        .home-btn { display: inline-block; background: var(--green-dark); color: white; text-decoration: none; padding: 13px 32px; border-radius: 6px; font-size: 0.9rem; font-weight: 600; transition: background 0.25s, transform 0.2s; }
        .home-btn:hover { background: var(--green-dark); transform: translateY(-1px); }

        footer { background: var(--green-dark); color: rgba(255,255,255,0.7); text-align: center; padding: 28px 20px; }
        footer p { font-size: 0.8rem; }
    </style>
</head>
<body>

    <header class="site-header">
        <span class="brand">HomeMade Pickles &amp; Snacks</span>
        <ul class="nav-links">
            <li><a href="{{ url_for('home') }}">Home</a></li>
        </ul>
    </header>

    <div class="main">
        <div class="success-card">
            <div class="success-icon">✓</div>
            <h1 class="success-title">Order Confirmed!</h1>
            <div class="success-divider"></div>
            <p class="success-sub">Thank you for choosing HomeMade Pickles &amp; Snacks.<br>Your order is being prepared with care and will reach you soon.</p>
            <a href="{{ url_for('home') }}" class="home-btn">Continue Shopping</a>
        </div>
    </div>

    <footer>
        <p>© 2024 HomeMade Pickles &amp; Snacks · Preserving Traditions · Crafted with Love in India</p>
    </footer>

    <script>
        // Clear cart on successful order
        localStorage.removeItem('cart');
    </script>
</body>
</html>
